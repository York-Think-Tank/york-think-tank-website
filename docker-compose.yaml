services:
  strapiDB:
    container_name: strapiDB
    image: postgres:18.4-alpine3.23
    env_file: .env
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - "${DATABASE_PORT}:5432"
    volumes:
      - strapi-data:/var/lib/postgresql

volumes:
  strapi-data: