# Builds and pushes both production images to GHCR when a version tag is
# pushed, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
# No secrets or env vars are baked into the images; everything is injected
# at runtime from the server's .env.
name: Build production images

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
          - name: strapi
            context: ./content-management-system
            dockerfile: ./content-management-system/Dockerfile.prod
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/york-think-tank/ytt-${{ matrix.name }}:latest
            ghcr.io/york-think-tank/ytt-${{ matrix.name }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
